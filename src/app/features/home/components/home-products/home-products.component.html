<section class="py-10 max-w-full  mx-auto px-4">
  <!-- ---------------------------------title ---------------------------------->
  <div class="">
    <div class="flex items-center my-5">
      <h2 class="relative ps-5 text-3xl font-bold text-[#1f2937]
                       before:content-[''] 
                       before:absolute before:left-0 before:top-1/2 before:-translate-y-1/2 
                       before:h-8 before:w-1.5 
                       before:bg-[#0aad0a] before:rounded-full">
        Featured <span class="text-primary">Products</span>
      </h2>
    </div>
  </div>


  <!-----------------------------------------cards-------------------------------->

  <div class="mt-5 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
    @for (product of productList(); track product._id) {
    <app-card [product] ='product'></app-card>
    }
  </div>
</section>
