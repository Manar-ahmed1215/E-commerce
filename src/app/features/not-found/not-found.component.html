<section class="bg-gray-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-10 left-10 text-green-200 text-4xl opacity-50 rotate-12"><i
            class="fa-solid fa-apple-whole"></i></div>
    <div class="absolute bottom-20 left-20 text-green-200 text-3xl opacity-40 -rotate-12"><i
            class="fa-solid fa-lemon"></i></div>
    <div class="absolute top-20 right-20 text-green-200 text-4xl opacity-50 rotate-45"><i
            class="fa-solid fa-carrot"></i></div>
    <div class="absolute bottom-40 right-10 text-green-200 text-2xl opacity-30"><i class="fa-solid fa-carrot"></i></div>

    <div class="max-w-xl w-full text-center z-10">

        <div class="relative inline-block mb-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                <i class="fa-solid fa-cart-shopping text-6xl text-green-500"></i>
            </div>
            <div
                class="absolute -top-4 -right-4 bg-green-500 text-white font-bold px-3 py-2 rounded-full border-4 border-white shadow-md text-sm">
                404
            </div>
            <div class="flex justify-center gap-2 mt-4">
                <div class="w-2 h-2 bg-green-400 rounded-full"></div>
                <div class="w-8 h-2 bg-green-200 rounded-full"></div>
                <div class="w-2 h-2 bg-green-400 rounded-full"></div>
            </div>
        </div>

        <h1 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">
            Oops! Nothing Here
        </h1>
        <p class="text-gray-500 text-lg mb-10 leading-relaxed max-w-md mx-auto">
            Looks like this page went out of stock! Don't worry, there's plenty more fresh content to explore.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button (click)="backToHome()"
                class="text-white bg-green-600 hover:bg-green-700 focus:ring-4 cursor-pointer focus:outline-none focus:ring-green-300 font-bold rounded-xl text-lg px-8 py-3.5 text-center inline-flex items-center shadow-lg transition-all duration-200 w-full sm:w-auto justify-center">
                <i class="fa-solid fa-house mr-2 text-sm"></i>
                Go to Homepage
            </button>

            <button (click)="goBack()" type="button"
                class="py-3.5 px-8 text-lg font-bold text-gray-900 cursor-pointer focus:outline-none bg-white rounded-xl border border-gray-200 hover:bg-gray-100 hover:text-green-600 focus:z-10 focus:ring-4 focus:ring-gray-100 transition-all duration-200 inline-flex items-center w-full sm:w-auto justify-center shadow-sm">
                <i class="fa-solid fa-arrow-left mr-2 text-sm"></i>
                Go Back
            </button>
        </div>
    </div>
</section>
