<section class="min-h-screen bg-gray-50  ">
    <div class="bg-[#22c55e] p-8 text-white">
        <div class="container mx-auto">
            <nav class="flex mb-4 text-sm" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3 text-green-100">
                    <li class="inline-flex items-center">
                        <a (click)="backToHome()"
                            class="font-medium hover:text-white transition-colors cursor-pointer">
                            Home
                        </a>
                    </li>

                    <li class="flex items-center">
                        <span class="mx-2 text-white/70">/</span> <a routerLink="/categories"
                            class="font-medium hover:text-white transition-colors cursor-pointer">
                            Categories
                        </a>
                    </li>

                </ol>
            </nav>

            <div class="flex items-center gap-4">

                <div
                    class="flex items-center justify-center w-16 h-16 bg-white/20 backdrop-blur-sm rounded-2xl shadow-inner">
                    <i class="fa-solid fa-layer-group text-3xl text-white"></i>
                </div>

                <div>
                    <h1 class="text-3xl font-bold text-white tracking-tight">
                        All Categories
                    </h1>
                    <p class="text-white/90 font-light mt-1">
                        Browse our wide range of product categories
                    </p>
                </div>

            </div>
        </div>
    </div>
    <div
        class="container mx-auto py-8 px-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 items-start">

        @for (category of categories(); track category._id) {
        <div
            class="group relative bg-white border border-gray-200 rounded-2xl p-4 shadow-sm transition-all duration-300 ease-in-out hover:-translate-y-2 hover:shadow-xl cursor-pointer text-center">
            <div class="overflow-hidden rounded-xl bg-gray-100 mb-4">
                <img [src]="category.image" [alt]="category.name"
                    class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-110">
            </div>

            <h3 class="text-gray-900 font-bold text-lg transition-colors duration-300 group-hover:text-green-600">
                {{category.name}}
            </h3>

            <div class="mt-2 opacity-0  overflow-hidden transition-all duration-500 group-hover:opacity-100">
                <a [routerLink]="['/category-details' , category._id ,category.slug]"
                    class="text-green-600 font-medium text-sm flex items-center justify-center gap-1">
                    View Subcategories
                    <i class="fas fa-arrow-right text-xs"></i>
                </a>
            </div>
        </div>
        }




    </div>

</section>
